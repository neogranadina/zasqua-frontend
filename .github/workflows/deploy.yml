name: Build and deploy to R2

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install B2 CLI
        run: pip install "b2[full]" --quiet

      - name: Download data from B2
        env:
          B2_APPLICATION_KEY_ID: ${{ secrets.B2_APPLICATION_KEY_ID }}
          B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
        run: |
          b2 account authorize "$B2_APPLICATION_KEY_ID" "$B2_APPLICATION_KEY"
          mkdir -p data/children
          b2 file download b2://zasqua-export/descriptions.json data/descriptions.json
          b2 file download b2://zasqua-export/repositories.json data/repositories.json
          b2 sync b2://zasqua-export/children/ data/children/
          ls -lh data/descriptions.json data/repositories.json
          echo "Children files: $(ls data/children/ | wc -l)"

      - name: Install npm dependencies
        run: npm ci

      - name: Build site with Eleventy
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          SITE_URL: https://zasqua.org
        run: |
          npx eleventy
          echo "Pages: $(find _site -name 'index.html' | wc -l)"
          echo "Site size: $(du -sh _site | cut -f1)"

      - name: Index with Pagefind
        run: npx pagefind --site _site

      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          rclone version

      - name: Deploy to R2
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          RCLONE_CONFIG_R2_ACL: private
        run: |
          rclone sync _site/ r2:zasqua-site --transfers 32 --checkers 32 --fast-list -v
          echo "Upload complete"
          rclone size r2:zasqua-site

      - name: Purge Cloudflare cache
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          curl -sf -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything": true}'
          echo "Cache purged"
