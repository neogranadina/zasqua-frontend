name: Test parallel R2 upload

on:
  workflow_dispatch:

jobs:
  test-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          pip install boto3 --quiet
          pip install "b2[full]" --quiet
          npm ci

      - name: Download data from B2
        env:
          B2_APPLICATION_KEY_ID: ${{ secrets.B2_APPLICATION_KEY_ID }}
          B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
        run: |
          b2 account authorize "$B2_APPLICATION_KEY_ID" "$B2_APPLICATION_KEY"
          mkdir -p data/children
          b2 file download b2://zasqua-export/descriptions.json data/descriptions.json
          b2 file download b2://zasqua-export/repositories.json data/repositories.json
          b2 sync b2://zasqua-export/children/ data/children/
          echo "Children files: $(ls data/children/ | wc -l)"

      - name: Build site
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          SITE_URL: https://zasqua.org
        run: |
          npx eleventy
          npx pagefind --site _site
          echo "Pages: $(find _site -name 'index.html' | wc -l)"
          echo "Site size: $(du -sh _site | cut -f1)"
          echo "File count: $(find _site -type f | wc -l)"

      - name: Test upload to zasqua-tests bucket
        env:
          PYTHONUNBUFFERED: "1"
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: python3 scripts/upload-to-r2.py _site zasqua-tests --concurrency 10
